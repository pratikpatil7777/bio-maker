<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!-- Peacock feather pointer cursor -->
  <!-- Feather shaft -->
  <path d="M12 22 L12 8" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Main eye of feather -->
  <ellipse cx="12" cy="6" rx="5" ry="6" fill="url(#featherGradient)" stroke="#D4AF37" stroke-width="0.5"/>
  <!-- Inner eye rings -->
  <ellipse cx="12" cy="5.5" rx="3.5" ry="4" fill="#1e3a5f"/>
  <ellipse cx="12" cy="5" rx="2.2" ry="2.5" fill="#2d5a87"/>
  <ellipse cx="12" cy="4.5" rx="1.2" ry="1.5" fill="#D4AF37"/>
  <!-- Pointer tip -->
  <circle cx="12" cy="3" r="0.8" fill="#fff"/>
  <defs>
    <linearGradient id="featherGradient" x1="12" y1="0" x2="12" y2="12" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
</svg>
